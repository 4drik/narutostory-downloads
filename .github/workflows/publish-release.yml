name: Publish client release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            NarutoStory_Installer.exe \
            NarutoStory_Installer_x86.exe \
            NarutoStory_Installer_macOS.zip \
            NarutoStory_Installer_Linux.tar.gz \
            --title "Naruto Story Client $GITHUB_REF_NAME" \
            --notes "Official Naruto Story installers for Windows, macOS, and Linux."
